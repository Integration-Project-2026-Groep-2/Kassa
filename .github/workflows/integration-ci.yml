name: Integration Tests (Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3.11-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmqctl status" --health-interval 5s --health-timeout 2s --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for RabbitMQ
        run: |
          echo "Waiting for RabbitMQ..."
          for i in {1..30}; do
            nc -z rabbitmq 5672 && break || sleep 2
          done

      - name: Run integration tests
        env:
          RABBIT_HOST: rabbitmq
          RABBIT_PORT: 5672
        run: |
          pytest -q tests/test_integration_amqp_rabbit.py
