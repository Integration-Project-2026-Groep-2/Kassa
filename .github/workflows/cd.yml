name: Build & Deploy Image to Main

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/integration-project-2026-groep-2/kassa
  SERVICE_NAME: Kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest-dev .
          docker push ${{ env.IMAGE_NAME }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -e
            # Try both possible paths
            cd ~/Kassa || cd ~/kassa

            # Pull the fresh image we just pushed
            # We use the service name 'kassa' as defined in infra compose
            docker compose pull kassa || docker-compose pull kassa

            # Restart the service
            docker compose up -d kassa || docker-compose up -d kassa

            # Verification
            echo "Verifying new code is present..."
            docker exec kassa_service grep -c "rabbitmq_sender" /mnt/extra-addons/kassa_pos/models/user_registration.py || echo "Warning: Code still looks old!"
