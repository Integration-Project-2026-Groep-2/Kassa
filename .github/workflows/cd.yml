name: Build & Deploy Image to Dev

on:
  push:
    branches: [dev]

env:
  IMAGE: ghcr.io/integration-project-2026-groep-2/kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest-dev

      - name: Push tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.DEV_DEPLOY_DIR }}"
            if [ -z "${DEPLOY_DIR}" ]; then
              DEPLOY_DIR="$HOME/Infra"
            fi

            cd "$DEPLOY_DIR"

            # Forceer exacte sync met remote zodat lokale wijzigingen deploy niet blokkeren.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            docker compose pull || true
            docker compose up -d --build
            docker compose ps
