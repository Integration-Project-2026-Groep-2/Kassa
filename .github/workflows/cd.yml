name: Build & Deploy Image to VM

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: kassa
  IMAGE: ghcr.io/integration-project-2026-groep-2/odoo-kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest

      - name: Push tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST || secrets.VM_HOST || secrets.DEV_HOST }}" || (echo "Missing DEPLOY_HOST/VM_HOST/DEV_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_USER || secrets.VM_USER || secrets.DEV_USER }}" || (echo "Missing DEPLOY_USER/VM_USER/DEV_USER" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY || secrets.VM_SSH_KEY || secrets.DEV_SSH_KEY }}" || (echo "Missing DEPLOY_SSH_KEY/VM_SSH_KEY/DEV_SSH_KEY" && exit 1)
          test -n "${{ secrets.DEPLOY_PATH || secrets.VM_DEPLOY_PATH }}" || (echo "Missing DEPLOY_PATH (or VM_DEPLOY_PATH)" && exit 1)
          test -n "${{ secrets.GHCR_USER }}" || (echo "Missing GHCR_USER" && exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "Missing GHCR_TOKEN" && exit 1)

      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST || secrets.VM_HOST || secrets.DEV_HOST }}
          username: ${{ secrets.DEPLOY_USER || secrets.VM_USER || secrets.DEV_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY || secrets.VM_SSH_KEY || secrets.DEV_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || secrets.VM_DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            export ODOO_IMAGE=${{ env.IMAGE }}:latest
            docker compose -f docker-compose.production.yml pull odoo
            docker compose -f docker-compose.production.yml up -d db rabbitmq
            docker compose -f docker-compose.production.yml run --rm --no-deps --entrypoint bash odoo -lc 'odoo --config=/etc/odoo/odoo.conf --db_host="$DB_HOST" --db_port="$DB_PORT" --db_user="$USER" --db_password="$PASSWORD" -d "$POSTGRES_DB" -u all --stop-after-init'
            docker compose -f docker-compose.production.yml up -d --force-recreate odoo
