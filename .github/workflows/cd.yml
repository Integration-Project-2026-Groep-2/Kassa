name: Build and Deploy Kassa - Single Image (Odoo + POS + Receivers)

on:
  push:
    branches: [main]

# This workflow builds a SINGLE Docker image containing:
# - Odoo 17 application
# - kassa_pos custom module (Kassa POS functionality)
# - src/ services (Heartbeat, User receivers, RabbitMQ integration)
# 
# The image is pushed to GHCR and deployed to dev/prod VMs.
# No separate images are built or deployed for POS.
# The entrypoint.sh automatically:
#   - Copies kassa_pos from /tmp to /mnt/extra-addons
#   - Installs/upgrades the kassa_pos module in Odoo
#   - Starts Heartbeat and Receiver services in background

env:
  SERVICE_NAME: kassa
  IMAGE: ghcr.io/integration-project-2026-groep-2/kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest-dev

      - name: Push tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Dev (Single Odoo+POS image)
        run: |
          # Validate secrets are set
          if [ -z "${{ secrets.DEV_HOST }}" ] || [ -z "${{ secrets.DEV_USER }}" ] || [ -z "${{ secrets.DEV_SSH_KEY }}" ]; then
            echo "ERROR: Missing required GitHub secrets (DEV_HOST, DEV_USER, DEV_SSH_KEY)"
            exit 1
          fi
          
          # Write SSH key with proper newline handling (unquoted heredoc to expand secret)
          SSH_KEY_FILE=$(mktemp)
          cat > "$SSH_KEY_FILE" << SSHKEY_EOF
          ${{ secrets.DEV_SSH_KEY }}
          SSHKEY_EOF
          chmod 600 "$SSH_KEY_FILE"
          
          # Test SSH connection
          echo "Testing SSH connection to ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}..."
          ssh -i "$SSH_KEY_FILE" -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}" "echo 'SSH connection successful'"
          
          # Run deploy commands
          echo "Running deploy script..."
          ssh -i "$SSH_KEY_FILE" -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}" << 'DEPLOY_EOF'
          set -e
          echo "Deploy script started on $(hostname)"
          cd ~/kassa
          docker compose -f docker-compose.production.yml pull odoo
          docker compose -f docker-compose.production.yml up -d
          docker compose -f docker-compose.production.yml ps
          echo "Deploy completed successfully"
          DEPLOY_EOF
          
          rm "$SSH_KEY_FILE"
