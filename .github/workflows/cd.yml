name: Build & Deploy Image to Main

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/integration-project-2026-groep-2/kassa
  SERVICE_NAME: kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest-dev .
          docker push ${{ env.IMAGE_NAME }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          # We use a single-line string to avoid parsing issues on restricted shells.
          # We also use the service name 'kassa' directly.
          script: docker compose pull kassa && docker compose up -d kassa && docker exec kassa_service grep -c "rabbitmq_sender" /mnt/extra-addons/kassa_pos/models/user_registration.py
