name: Build & Deploy Image to Main

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/integration-project-2026-groep-2/kassa
  SERVICE_NAME: Kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest-dev .
          docker push ${{ env.IMAGE_NAME }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ~/Kassa || cd ~/kassa || exit 1
            
            echo "Current directory: $(pwd)"
            
            # 1. Pull latest images for all services in the file
            docker compose pull || docker-compose pull
            
            # 2. Restart all services (this will update whichever service uses the image)
            docker compose up -d || docker-compose up -d
            
            # 3. Verification - check the container we know exists
            echo "Verifying new code in kassa_service..."
            docker exec kassa_service grep -c "rabbitmq_sender" /mnt/extra-addons/kassa_pos/models/user_registration.py || echo "Verification failed: kassa_service not found or code is old."
