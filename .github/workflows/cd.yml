name: Build and Deploy Kassa - Single Image (Odoo + POS + Receivers)

on:
  push:
    branches: [main]

# This workflow builds a SINGLE Docker image containing:
# - Odoo 17 application
# - kassa_pos custom module (Kassa POS functionality)
# - src/ services (Heartbeat, User receivers, RabbitMQ integration)
# 
# The image is pushed to GHCR and deployed to dev/prod VMs.
# No separate images are built or deployed for POS.
# The entrypoint.sh automatically:
#   - Copies kassa_pos from /tmp to /mnt/extra-addons
#   - Installs/upgrades the kassa_pos module in Odoo
#   - Starts Heartbeat and Receiver services in background

env:
  SERVICE_NAME: kassa
  IMAGE: ghcr.io/integration-project-2026-groep-2/kassa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest-dev

      - name: Push tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest-dev

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev (Single Odoo+POS image)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          request_pty: true
          script: |
            cd ~/kassa
            docker compose -f docker-compose.production.yml pull odoo
            docker compose -f docker-compose.production.yml up -d
            docker compose -f docker-compose.production.yml ps
