name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit and detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit detect-secrets

      - name: Run pip-audit
        run: |
          pip-audit --format=columns

      - name: Run detect-secrets scan (all files)
        run: |
          # Some detect-secrets versions don't support --json; write raw scan output instead
          detect-secrets scan --all-files > detect-secrets-output.txt || true

      - name: Upload detect-secrets result
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-output
          path: detect-secrets-output.txt

      - name: Install gitleaks CLI
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks (CLI)
        run: |
          # Run detect and always succeed the step (report will be uploaded)
          gitleaks detect --source . --report-path gitleaks-report.json || true

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
