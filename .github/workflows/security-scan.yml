name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit and detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit detect-secrets

      - name: Run pip-audit
        run: |
          pip-audit --format=columns

      - name: Run detect-secrets scan (all files)
        run: |
          detect-secrets scan --all-files --json > detect-secrets-output.json

      - name: Upload detect-secrets result
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-output
          path: detect-secrets-output.json

      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source . --report-path gitleaks-report.json

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
