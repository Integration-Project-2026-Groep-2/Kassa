services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kassa_db}
      POSTGRES_USER: ${POSTGRES_USER:-kassa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kassa}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "0.0.0.0:${RABBIT_PORT:-5672}:5672"
      - "0.0.0.0:${RABBIT_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBIT_VHOST:-/}

  odoo:
    build: .
    depends_on:
      - db
      - rabbitmq
    ports:
      - "0.0.0.0:${ODOO_PORT:-8069}:8069"
      - "0.0.0.0:${ODOO_LONGPOLLING_PORT:-8072}:8072"
    volumes:
      - ./kassa_pos:/mnt/extra-addons/kassa_pos
      - odoo_data:/var/lib/odoo
    environment:
      HOST: ${DB_HOST:-db}
      USER: ${POSTGRES_USER:-kassa}
      PASSWORD: ${POSTGRES_PASSWORD:-kassa}
      RABBITMQ_HOST: ${RABBIT_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBIT_PORT:-5672}
      RABBITMQ_USER: ${RABBIT_USER:-guest}
      RABBITMQ_PASS: ${RABBIT_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBIT_VHOST:-/}
      USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE:-user.direct}
      USER_EVENTS_EXCHANGE_TYPE: ${USER_EVENTS_EXCHANGE_TYPE:-direct}
      USER_EVENTS_DLX_EXCHANGE: ${USER_EVENTS_DLX_EXCHANGE:-user.dlx}
      USER_EVENTS_RETRY_EXCHANGE: ${USER_EVENTS_RETRY_EXCHANGE:-user.retry}
      USER_EVENTS_RETRY_TTL_MS: ${USER_EVENTS_RETRY_TTL_MS:-15000}
    command: >
      odoo
      --db_host=${DB_HOST:-db}
      --db_port=${DB_PORT:-5432}
      --db_user=${POSTGRES_USER:-kassa}
      --db_password=${POSTGRES_PASSWORD:-kassa}
      --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      --db-filter=^${POSTGRES_DB:-kassa_db}$
      --longpolling-port=${ODOO_LONGPOLLING_PORT:-8072}
      --proxy-mode

  pos_receiver:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    working_dir: /app/src
    command: python3 main_pos_receiver.py
    environment:
      RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
      RABBIT_PORT: ${RABBIT_PORT:-5672}
      RABBIT_USER: ${RABBIT_USER:-guest}
      RABBIT_PASSWORD: ${RABBIT_PASSWORD:-guest}
      RABBIT_VHOST: ${RABBIT_VHOST:-/}
    restart: unless-stopped

  heartbeat:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    working_dir: /app/src
    command: python3 main_heartbeat.py
    environment:
      RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
      RABBIT_PORT: ${RABBIT_PORT:-5672}
      RABBIT_USER: ${RABBIT_USER:-guest}
      RABBIT_PASSWORD: ${RABBIT_PASSWORD:-guest}
      RABBIT_VHOST: ${RABBIT_VHOST:-/}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-1}
      HEARTBEAT_QUEUE: ${HEARTBEAT_QUEUE:-kassa.heartbeat}
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
