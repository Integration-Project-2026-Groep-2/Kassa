services:
    db:
        image: postgres:15
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-kassa_db}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data

    rabbitmq:
        image: rabbitmq:3-management
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - "0.0.0.0:${RABBIT_PORT:-5672}:5672"
            - "0.0.0.0:${RABBIT_MANAGEMENT_PORT:-15672}:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
            RABBITMQ_DEFAULT_VHOST: ${RABBIT_VHOST:-/}

    odoo:
        build: .
        depends_on:
            db:
                condition: service_started
            rabbitmq:
                condition: service_healthy
        ports:
            - "0.0.0.0:${ODOO_PORT:-8069}:8069"
            - "0.0.0.0:${ODOO_LONGPOLLING_PORT:-8072}:8072"
        volumes:
            - ./kassa_pos:/mnt/extra-addons/kassa_pos
            - odoo_data:/var/lib/odoo
        environment:
            HOST: ${DB_HOST:-db}
            USER: ${POSTGRES_USER}
            PASSWORD: ${POSTGRES_PASSWORD}
            DB_HOST: ${DB_HOST:-db}
            DB_PORT: ${DB_PORT:-5432}
            POSTGRES_DB: ${POSTGRES_DB:-kassa_db}
            RABBITMQ_HOST: ${RABBIT_HOST:-rabbitmq}
            RABBITMQ_PORT: ${RABBIT_PORT:-5672}
            RABBITMQ_USER: ${RABBIT_USER}
            RABBITMQ_PASS: ${RABBIT_PASSWORD}
            RABBITMQ_VHOST: ${RABBIT_VHOST:-/}
            RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
            RABBIT_PORT: ${RABBIT_PORT:-5672}
            RABBIT_USER: ${RABBIT_USER}
            RABBIT_PASSWORD: ${RABBIT_PASSWORD}
            RABBIT_VHOST: ${RABBIT_VHOST:-/}
            HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-1}
            HEARTBEAT_EXCHANGE: ${HEARTBEAT_EXCHANGE:-heartbeat.direct}
            HEARTBEAT_ROUTING_KEY: ${HEARTBEAT_ROUTING_KEY:-routing.heartbeat}
            ENABLE_HEARTBEAT_IN_ODOO_IMAGE: ${ENABLE_HEARTBEAT_IN_ODOO_IMAGE:-true}
            USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE:-user.topic}
            USER_EVENTS_EXCHANGE_TYPE: ${USER_EVENTS_EXCHANGE_TYPE:-topic}
            USER_EVENTS_DLX_EXCHANGE: ${USER_EVENTS_DLX_EXCHANGE:-user.dlx}
            USER_EVENTS_RETRY_EXCHANGE: ${USER_EVENTS_RETRY_EXCHANGE:-user.retry}
            USER_EVENTS_RETRY_TTL_MS: ${USER_EVENTS_RETRY_TTL_MS:-15000}

    pos_receiver:
        build: .
        entrypoint: ["python3"]
        depends_on:
            rabbitmq:
                condition: service_healthy
        working_dir: /app/src
        command: main_pos_receiver.py
        environment:
            RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
            RABBIT_PORT: ${RABBIT_PORT:-5672}
            RABBIT_USER: ${RABBIT_USER}
            RABBIT_PASSWORD: ${RABBIT_PASSWORD}
            RABBIT_VHOST: ${RABBIT_VHOST:-/}
            ODOO_URL: ${ODOO_URL:-http://odoo:8069}
            ODOO_DB: ${POSTGRES_DB:-kassa_db}
            ODOO_USER: ${ODOO_USER}
            ODOO_PASSWORD: ${ODOO_PASSWORD}
            ENABLE_HEARTBEAT_IN_ODOO_IMAGE: "false"
        restart: unless-stopped

    contact_receiver:
        build: .
        entrypoint: ["python3"]
        depends_on:
            rabbitmq:
                condition: service_healthy
            odoo:
                condition: service_started
        working_dir: /app/src
        command: main.py
        environment:
            RABBIT_HOST: ${RABBIT_HOST:-rabbitmq}
            RABBIT_PORT: ${RABBIT_PORT:-5672}
            RABBIT_USER: ${RABBIT_USER}
            RABBIT_PASSWORD: ${RABBIT_PASSWORD}
            RABBIT_VHOST: ${RABBIT_VHOST:-/}
            ODOO_URL: ${ODOO_URL:-http://odoo:8069}
            ODOO_DB: ${POSTGRES_DB:-kassa_db}
            ODOO_USER: ${ODOO_USER}
            ODOO_PASSWORD: ${ODOO_PASSWORD}
            ENABLE_HEARTBEAT_IN_ODOO_IMAGE: "false"
        restart: unless-stopped

volumes:
    postgres_data:
    odoo_data:
